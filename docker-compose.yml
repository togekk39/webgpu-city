services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: webgpu-city-dev
    working_dir: /workspace/webgpu-city
    command: trunk serve --address 0.0.0.0 --port 8080
    environment:
      RUST_BACKTRACE: "1"
    ports:
      - "${TRUNK_PORT:-8080}:8080"
    volumes:
      - .:/workspace/webgpu-city
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/webgpu-city/target
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target:
