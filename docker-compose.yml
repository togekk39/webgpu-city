services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: webgpu-city-dev
    working_dir: /workspace/webgpu-city
    command: cargo run
    environment:
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/tmp}
      RUST_BACKTRACE: "1"
      WGPU_BACKEND: ${WGPU_BACKEND:-vulkan}
    volumes:
      - .:/workspace/webgpu-city
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/webgpu-city/target
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XDG_RUNTIME_DIR:-/tmp}:${XDG_RUNTIME_DIR:-/tmp}:rw
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target:
